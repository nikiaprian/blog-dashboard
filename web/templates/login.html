<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SEO Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
  <div class="container">
    <div class="login-brand">
      <a class="app-brand login-brand__logo" href="/login">
        <span class="app-brand__mark">S</span>
        <span class="app-brand__text">SEO Dashboard</span>
      </a>
      <h1>SEO Dashboard</h1>
      <p>Login untuk mengelola blog/domain whitelist.</p>
    </div>
    <div class="login-card">
      {{if .Message}}<p class="login-msg">{{.Message}}</p>{{end}}
      <form method="post" action="/login">
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
