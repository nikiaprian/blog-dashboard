<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SEO Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/js/table-sort.js" defer></script>
</head>
<body class="app">
  <header class="app-header">
    <div class="container">
      <div class="app-header__row app-header__row--user">
        <a class="app-brand" href="/admin/users">
          <span class="app-brand__mark">S</span>
          <span class="app-brand__text">SEO Dashboard</span>
        </a>
        <a class="app-header__context app-header__context--link" href="/account/password" title="Klik untuk ubah password">{{.Me.Email}}</a>
        <div class="app-header__tools">
          <form method="post" action="/logout" class="form-reset">
            <button type="submit" class="btn-ghost btn-header">Keluar</button>
          </form>
        </div>
      </div>
    </div>
  </header>

  <main class="container app-main">
    {{if .Message}}<div class="flash flash-success">{{.Message}}</div>{{end}}
    <div class="tabs-wrap">
      <nav class="tabs tabs--admin" aria-label="Admin">
        <a class="active" aria-current="page" href="/admin/users">Users</a>
        <a href="/admin/logs">Verify Logs</a>
        <a href="/admin/servers">Servers</a>
        <a href="/admin/servers?tab=domains">List Domain /opt</a>
      </nav>
    </div>
    <div class="page-heading">
      <h1 class="page-heading__title">User management</h1>
    </div>

    <div class="card">
      <h3 class="card-title">Create User</h3>
      <form
        class="new-user"
        method="post"
        action="/admin/users"
        hx-post="/admin/users"
        hx-target="#users-body"
        hx-swap="innerHTML"
        hx-on::after-request="if (event.detail.successful === false) { var x = event.detail.xhr; var t = (x &amp;&amp; x.responseText) ? x.responseText.substring(0,500) : ''; alert(t || 'Permintaan gagal'); }">
        <input type="email" name="email" placeholder="email user" required>
        <input type="password" name="password" placeholder="password min 8 char" minlength="8" required>
        <select name="role">
          <option value="user">user</option>
          <option value="admin">admin</option>
        </select>
        <button type="submit">Buat User</button>
      </form>
    </div>

    <div class="card">
      <h3 class="card-title">Users</h3>
      <div class="table-wrap">
        <table class="table-admin-users" data-sortable="true">
          <thead>
            <tr>
              <th><button type="button" class="th-sort" data-sort-type="number">ID</button></th>
              <th><button type="button" class="th-sort">Email</button></th>
              <th><button type="button" class="th-sort">Role</button></th>
              <th><button type="button" class="th-sort">Status</button></th>
              <th><button type="button" class="th-sort">License Key</button></th>
              <th><button type="button" class="th-sort">Action</button></th>
            </tr>
          </thead>
          <tbody id="users-body" hx-get="/admin/users/table" hx-trigger="load" hx-swap="innerHTML">
            {{template "partials_user_rows.html" .}}
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script>
    function htmxUserToggleForm(event) {
      var elt = event.detail && event.detail.elt;
      if (!elt) return null;
      return elt.tagName === "FORM" ? elt : elt.closest ? elt.closest("form") : null;
    }
    function htmxUserToggleBefore(event) {
      var form = htmxUserToggleForm(event);
      var inp = form && form.querySelector(".status-input");
      if (inp) inp.disabled = true;
    }
    function htmxUserToggleAfter(event) {
      var form = htmxUserToggleForm(event);
      var inp = form && form.querySelector(".status-input");
      if (inp) inp.disabled = false;
      if (event.detail && !event.detail.successful && inp) {
        inp.checked = !inp.checked;
        var on = "User aktif — matikan untuk menonaktifkan";
        var off = "User nonaktif — aktifkan";
        inp.setAttribute("aria-label", inp.checked ? on : off);
      }
    }
  </script>
</body>
</html>
