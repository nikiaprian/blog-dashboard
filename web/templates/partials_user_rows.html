{{define "partials_user_rows.html"}}
{{range .Users}}
<tr>
  <td>{{.ID}}</td>
  <td>{{.Email}}</td>
  <td>{{.Role}}</td>
  <td>{{if eq .Role "admin"}}active{{else}}{{if .IsActive}}active{{else}}inactive{{end}}{{end}}</td>
  <td><code>{{.LicenseKey}}</code></td>
  <td class="td-user-actions">
    <div class="user-actions">
      <div class="user-actions-row">
        {{if ne .Role "admin"}}
        <form
          class="form-reset status-switch-form"
          hx-post="/admin/users/{{.ID}}/toggle"
          hx-target="#users-body"
          hx-swap="innerHTML"
          hx-on::before-request="htmxUserToggleBefore(event)"
          hx-on::after-request="htmxUserToggleAfter(event)">
          <label class="status-switch">
            <input
              type="checkbox"
              class="status-input"
              {{if .IsActive}}checked{{end}}
              onchange="this.form.requestSubmit()"
              aria-label="{{if .IsActive}}User aktif — matikan untuk menonaktifkan{{else}}User nonaktif — aktifkan{{end}}">
            <span class="status-slider" aria-hidden="true"></span>
          </label>
        </form>
        {{else}}
        <span class="user-actions-badge" title="Akun admin — tidak ada toggle aktif">Admin</span>
        {{end}}
        <form class="form-reset" hx-post="/admin/users/{{.ID}}/reset-license" hx-target="#users-body" hx-swap="innerHTML">
          <button type="submit" class="btn-ghost btn-sm">Reset License</button>
        </form>
      </div>
      <form class="user-actions-password form-reset" hx-post="/admin/users/{{.ID}}/reset-password" hx-target="#users-body" hx-swap="innerHTML">
        <input class="input-user-pw" type="password" name="password" placeholder="Password baru" minlength="8" required>
        <button type="submit" class="btn-sm">Reset Password</button>
      </form>
      <a class="user-actions-link" href="/admin/users/{{.ID}}/domains">Manage Domains</a>
    </div>
  </td>
</tr>
{{end}}
{{end}}
