{{define "partials_domain_rows_user.html"}}
{{range .Domains}}
<tr>
  <td>{{.ID}}</td>
  <td>{{.Domain}}</td>
  <td>
    <form class="inline" hx-post="/dashboard/domains/{{.ID}}/delete" hx-target="#domain-body-user" hx-swap="innerHTML"
      hx-on::after-request="onDomainWhitelistDeleted(event)">
      <button type="submit" class="btn-danger btn-sm">Delete</button>
    </form>
  </td>
</tr>
{{end}}
{{end}}
