{{define "partials_add_domain_log.html"}}
{{if .ScriptLog}}
<div class="script-log {{if .ScriptLog.Success}}ok{{else}}fail{{end}}">
  <strong>Server: {{.ScriptLog.ServerName}}</strong>
  <pre>{{.ScriptLog.Output}}</pre>
  <div class="cell-actions mt-md">
    <button type="button" class="btn-ghost" onclick="closeAddDomainModal()">Close</button>
    <button type="button" class="btn-primary" onclick="resetAddDomainModal()">Tambah Domain Lagi</button>
  </div>
</div>
{{end}}
{{end}}
