<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SEO Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="app">
  <header class="app-header">
    <div class="container">
      <div class="app-header__row app-header__row--user">
        <a class="app-brand" href="{{if eq .Me.Role "admin"}}/admin/users{{else}}/dashboard{{end}}">
          <span class="app-brand__mark">S</span>
          <span class="app-brand__text">SEO Dashboard</span>
        </a>
        <a class="app-header__context app-header__context--link" href="/account/password" title="Klik untuk ubah password">{{.Me.Email}}</a>
        <div class="app-header__tools">
          <form method="post" action="/logout" class="form-reset">
            <button type="submit" class="btn-ghost btn-header">Keluar</button>
          </form>
        </div>
      </div>
    </div>
  </header>

  <main class="container app-main">
    <div class="page-heading">
      <h1 class="page-heading__title">Ubah Password</h1>
      <a class="link-muted page-heading__link" href="{{if eq .Me.Role "admin"}}/admin/users{{else}}/dashboard{{end}}">Kembali</a>
    </div>
    {{if .Message}}<div class="flash flash-success">{{.Message}}</div>{{end}}

    <div class="card">
      <h3 class="card-title">Update password akun</h3>
      <form method="post" action="/account/password" class="modal-grid" autocomplete="off">
        <input type="password" name="current_password" placeholder="Password saat ini" required>
        <input type="password" name="new_password" placeholder="Password baru (min 8 karakter)" minlength="8" required>
        <input type="password" name="confirm_password" placeholder="Konfirmasi password baru" minlength="8" required>
        <div class="modal-actions">
          <button type="submit">Simpan Password</button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
