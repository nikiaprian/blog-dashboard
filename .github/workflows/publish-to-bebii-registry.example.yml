# #   1. Salin file ini ke:  .github/workflows/publish-to-bebii-registry.yml
# #   2. Hapus suffix .example dari nama file
# #   3. Sesuaikan env ARTIFACT_NAME, langkah Build archive, dan trigger
# #
# # SECRETS di GitHub (Settings → Secrets and variables → Actions):
# #   BEBII_REGISTRY_URL    → https://dashboard-anda.com  (tanpa slash di akhir)
# #   BEBII_REGISTRY_TOKEN  → sama dengan REGISTRY_UPLOAD_TOKEN di .env server
# #
# # SERVER (.env bebii-seo-dashboard):
# #   REGISTRY_UPLOAD_TOKEN=<secret yang sama>
# #   REGISTRY_ROOT=/var/bebii-registry   # opsional
# #
# # API yang dipanggil:
# #   POST {BEBII_REGISTRY_URL}/api/registry/{artifact}
# #   Header: Authorization: Bearer {token}
# #           X-Registry-Version, X-Registry-Filename, X-Git-Sha (opsional)
# #
# # =============================================================================

